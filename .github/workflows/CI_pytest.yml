name: Pytest

on:
  push:
    branches: [main, trunk, feature/*, task/*]
  pull_request:
    branches: [main]

jobs:
  pytest:
    runs-on: ubuntu-22.04 # Recomiendo 22.04 por estabilidad, 24.04 puede dar problemas con wheels antiguas

    env:
      MARIADB_ROOT_PASSWORD: uvlhub_root_password
      MARIADB_DATABASE: uvlhubdb_test
      MARIADB_TEST_DATABASE: uvlhubdb_test
      MARIADB_USER: uvlhub_user
      MARIADB_PASSWORD: uvlhub_password
      MARIADB_HOSTNAME: 127.0.0.1
      MARIADB_PORT: 3306
      FLASK_ENV: testing

    services:
      mariadb:
        image: mariadb:11.4 # Versión LTS válida
        env:
          MARIADB_ROOT_PASSWORD: ${{ env.MARIADB_ROOT_PASSWORD }}
          MARIADB_DATABASE: ${{ env.MARIADB_DATABASE }}
          MARIADB_USER: ${{ env.MARIADB_USER }}
          MARIADB_PASSWORD: ${{ env.MARIADB_PASSWORD }}
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    steps:
      # CORREGIDO: v4 en lugar de v5
      - name: Checkout
        uses: actions/checkout@v4

      # CORREGIDO: v5 en lugar de v6
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # --- CORRECCIÓN AQUÍ ---
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

          # 1. Borramos la línea que intenta bajar rosemary de GitHub (causante del fallo)
          #    Esto elimina cualquier línea que contenga la palabra 'rosemary'

          sed -i '/rosemary/d' requirements.txt

          # 2. Instalamos el resto de librerías limpiamente
          pip install -r requirements.txt

          # 3. Instalamos rosemary usando la carpeta local que ya descargó el checkout
          #    (Asumiendo que la carpeta 'rosemary' está en la raíz del repo)
          pip install -e ./rosemary

      - name: Security audit with pip-audit
        # Nota: Si pip-audit encuentra CUALQUIER vulnerabilidad, el workflow fallará aquí.
        # Usa "|| true" al final si quieres ver el reporte pero no detener el workflow.
        run: |
          pip install pip-audit bandit
          pip-audit --ignore-vuln GHSA-g8c6-8fjj-2r4m --ignore-vuln GHSA-4xh5-x5gv-qwph
          bandit -r app core -lll

      - name: Run Tests with Coverage
        run: |
          pip install pytest-cov
          pytest app/modules/ --ignore-glob='*selenium*' --cov=app --cov-report=xml --cov-report=term
